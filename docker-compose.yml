services:
  mysql:
    image: mysql:8.0
    container_name: local-service-finder-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: local_service_finder
    command:
      - --performance-schema=OFF
      - --innodb-buffer-pool-size=128M
      - --max-connections=30
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    image: local-service-finder-backend
    container_name: local-service-finder-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx300m"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/local_service_finder
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 3
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 1
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    image: local-service-finder-frontend
    container_name: local-service-finder-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data: